<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZMart</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fafafa;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #2a5298;
      color: white;
    }

    button {
      cursor: pointer;
    }

    .login-box {
      display: none;
      padding: 20px;
      background: white;
      margin: 20px;
      border-radius: 10px;
    }

    .product {
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="top">
    <h2>EZMart</h2>

    <button onclick="toggleLogin()">
      Login
    </button>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="login-box">
    <h3>Create Account</h3>

    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" placeholder="Password"><br><br>

    <button onclick="registerUser()">Register</button>

    <p id="msg"></p>
  </div>

  <!-- PRODUCTS -->
  <h3 style="padding:20px;">Products</h3>

  <div id="productGrid" class="grid"></div>

  <script>
    // Toggle login panel
    function toggleLogin() {
      const box = document.getElementById("loginBox");
      box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    // Fake register (later connect Cognito / API)
async function registerUser() {

    const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const response = await fetch(
        "https://ok4urare7i.execute-api.us-east-1.amazonaws.com/prod/register",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(user)
        }
    );

    const data = await response.json();

    document.getElementById("msg").innerText =
        data.message || "User registered!";
}

    // SAMPLE PRODUCTS (later replace with DynamoDB API)
    const products = [
      { name: "iPhone 15", price: 799 },
      { name: "Laptop", price: 999 },
      { name: "Headphones", price: 199 }
    ];

    function loadProducts() {
      const grid = document.getElementById("productGrid");

      grid.innerHTML = products.map(p => `
        <div class="product">
          <h4>${p.name}</h4>
          <p>$${p.price}</p>
        </div>
      `).join('');
    }

    loadProducts();
  </script>

</body>

</html>
